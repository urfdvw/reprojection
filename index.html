<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Reprojection</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: #0d0d0d; overflow: hidden; }
canvas { position: fixed; inset: 0; width: 100%; height: 100%; display: block; cursor: grab; touch-action: none; }
canvas.dragging { cursor: grabbing; }

#drop-zone {
  position: fixed; inset: 0; z-index: 20;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: #0d0d0d; color: #aaa;
  font-family: 'Courier New', monospace;
  cursor: pointer; user-select: none;
  transition: background 0.15s;
}
#drop-zone.drag-over { background: #0d1a0d; }
#drop-zone.hidden { display: none; }
#drop-zone h1 { font-size: 1.6em; font-weight: normal; letter-spacing: 0.05em; color: #7af; margin-bottom: 0.5em; }
#drop-zone p { color: #555; font-size: 0.85em; margin: 3px 0; }
#drop-zone .hint { margin-top: 2em; color: #334; font-size: 0.78em; line-height: 2; text-align: center; }

/* frame overlay – sized/positioned by JS */
#frame-box {
  position: fixed; pointer-events: none; z-index: 8;
  border: 1px solid rgba(255,255,255,0.35);
  box-shadow: 0 0 0 9999px rgba(0,0,0,0.28);
  display: none;
}

.panel {
  position: fixed; z-index: 10;
  background: rgba(0,0,0,0.65);
  font-family: 'Courier New', monospace; font-size: 12px;
  color: #bbb; padding: 8px 12px; border-radius: 6px;
  border: 1px solid rgba(255,255,255,0.07);
}
.panel.hidden { display: none; }

#hud  { bottom: 14px; left: 14px; line-height: 1.9; pointer-events: none; }
#help { top: 14px; left: 14px; line-height: 1.9; pointer-events: none; }
#ctrl { top: 14px; right: 14px; }

#ctrl label { display: block; margin-bottom: 8px; color: #888; }
#ctrl input[type=number] {
  width: 68px; background: #181818; color: #ddd;
  border: 1px solid #3a3a3a; padding: 3px 6px;
  border-radius: 3px; font-family: inherit; font-size: 12px; margin-right: 2px;
}
#ctrl input[type=range] {
  width: 100%; accent-color: #7af; margin: 4px 0;
  cursor: pointer;
}
.btn {
  display: inline-block; padding: 3px 9px;
  background: #1f1f1f; color: #bbb; border: 1px solid #3a3a3a;
  border-radius: 3px; cursor: pointer;
  font-family: 'Courier New', monospace; font-size: 12px;
  margin-top: 4px; margin-right: 4px;
}
.btn:hover { background: #2a2a2a; }

/* ---- Frame resize handles ---- */
.frame-handle {
  position: absolute;
  pointer-events: auto;
  background: rgba(255,255,255,0.85);
  border-radius: 1px;
}
.frame-handle[data-dir="nw"] { width:14px;height:14px; top:-7px; left:-7px; cursor:move; background:#7af; border-radius:50%; box-shadow:0 0 0 2px rgba(0,0,0,0.5); }
.frame-handle[data-dir="ne"] { width:10px;height:10px; top:-5px;  right:-5px;  cursor:ne-resize; }
.frame-handle[data-dir="sw"] { width:10px;height:10px; bottom:-5px;left:-5px;  cursor:sw-resize; }
.frame-handle[data-dir="se"] { width:10px;height:10px; bottom:-5px;right:-5px; cursor:se-resize; }
.frame-handle[data-dir="n"]  { height:6px; left:25%; right:25%; top:-3px;    cursor:n-resize; }
.frame-handle[data-dir="s"]  { height:6px; left:25%; right:25%; bottom:-3px; cursor:s-resize; }
.frame-handle[data-dir="e"]  { width:6px;  top:25%; bottom:25%; right:-3px;  cursor:e-resize; }
.frame-handle[data-dir="w"]  { width:6px;  top:25%; bottom:25%; left:-3px;   cursor:w-resize; }

#ctrl select {
  background: #181818; color: #ddd;
  border: 1px solid #3a3a3a; padding: 3px 6px;
  border-radius: 3px; font-family: inherit; font-size: 12px;
  width: 100%; margin-top: 2px; cursor: pointer;
}

body.mobile #drop-zone .hint,
body.mobile #help,
body.mobile #hud {
  display: none !important;
}

body.mobile #ctrl {
  top: auto;
  right: 12px;
  bottom: 12px;
  left: 12px;
  width: auto;
  max-width: none;
}

body.mobile #ctrl label {
  margin-bottom: 10px;
}

body.mobile #ctrl input[type=number] {
  width: 72px;
}

body.mobile .btn {
  min-height: 32px;
}
</style>
</head>
<body>

<canvas id="c"></canvas>
<div id="frame-box">
  <div class="frame-handle" data-dir="n"></div>
  <div class="frame-handle" data-dir="s"></div>
  <div class="frame-handle" data-dir="e"></div>
  <div class="frame-handle" data-dir="w"></div>
  <div class="frame-handle" data-dir="nw"></div>
  <div class="frame-handle" data-dir="ne"></div>
  <div class="frame-handle" data-dir="sw"></div>
  <div class="frame-handle" data-dir="se"></div>
</div>

<div id="drop-zone">
  <h1>Reprojection</h1>
  <p>Drop an image here, or click to open</p>
  <p>Focal length auto-detected from EXIF</p>
  <div class="hint">
    Arrow keys: pan &nbsp;|&nbsp; [ ] roll &nbsp;|&nbsp; scroll: zoom<br>
    Mouse drag: pan &nbsp;|&nbsp; R: reset
  </div>
</div>

<div id="help" class="panel hidden">
  Arrow keys &nbsp; Pan<br>
  [ ] &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Roll<br>
  Scroll / -= &nbsp; Zoom<br>
  Drag mouse &nbsp; Pan<br>
  R &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Reset
</div>

<div id="hud" class="panel hidden"></div>

<div id="ctrl" class="panel hidden">
  <label>
    35mm equiv. focal length<br>
    <input type="number" id="f35" min="4" max="2000" step="1" value="50">mm
    <button class="btn" id="apply-btn">Apply</button>
  </label>
  <label style="display:block;margin-bottom:8px;color:#888">
    Projection<br>
    <span style="display:flex;justify-content:space-between;font-size:10px;color:#555;margin-top:2px">
      <span>Perspective</span><span>Equidistant</span>
    </span>
    <input type="range" id="fisheye-k" min="0" max="1" step="0.01" value="0">
  </label>
  <label style="display:block;margin-bottom:8px;color:#888">
    Export ratio<br>
    <select id="frame-ratio">
      <option value="original">Original</option>
      <option value="freeform">Free form</option>
      <option value="1:1">1:1 Square</option>
      <optgroup label="Landscape">
        <option value="16:9">16:9</option>
        <option value="4:3">4:3</option>
        <option value="3:2">3:2</option>
        <option value="5:4">5:4</option>
        <option value="21:9">21:9 Ultrawide</option>
        <option value="2.39:1">2.39:1 Cinema</option>
      </optgroup>
      <optgroup label="Portrait">
        <option value="9:16">9:16</option>
        <option value="3:4">3:4</option>
        <option value="2:3">2:3</option>
        <option value="4:5">4:5</option>
        <option value="9:21">9:21 Tall</option>
      </optgroup>
    </select>
  </label>
  <button class="btn" id="open-btn">Open image</button>
  <button class="btn" id="reset-btn">Reset view</button>
  <button class="btn" id="export-btn">Export frame</button>
</div>

<input type="file" id="file-in" accept="image/*" style="display:none">

<script src="https://cdn.jsdelivr.net/npm/exifr@7/dist/lite.umd.js"></script>
<script>
'use strict';

// ---- WebGL setup ------------------------------------------------------------
const cv = document.getElementById('c');
// preserveDrawingBuffer needed for toDataURL() export
const gl = cv.getContext('webgl', { preserveDrawingBuffer: true })
        || cv.getContext('experimental-webgl', { preserveDrawingBuffer: true });
if (!gl) { alert('WebGL not supported'); }

function resize() {
  const dpr = devicePixelRatio || 1;
  cv.width  = Math.round(window.innerWidth  * dpr);
  cv.height = Math.round(window.innerHeight * dpr);
  gl.viewport(0, 0, cv.width, cv.height);
}
resize();
window.addEventListener('resize', () => { resize(); draw(); updateFrame(); });

// ---- Shaders ----------------------------------------------------------------
// No Unicode characters in GLSL source (some drivers reject non-ASCII)
const VS = 'attribute vec2 a; void main(){gl_Position=vec4(a,0.,1.);}';

const FS = [
  'precision highp float;',
  'uniform sampler2D uTex;',
  'uniform vec2  uRes;',  // canvas px
  'uniform vec2  uImg;',  // image px
  'uniform float uFS;',   // source focal length (image px)
  'uniform float uFD;',   // dest focal length   (image px)
  'uniform float uK;',    // fisheye blend: 0=perspective, 1=equidistant
  'uniform mat3  uR;',    // rotation matrix
  'uniform float uSC;',   // canvas px per image px (overrides auto)
  'uniform vec2  uCenter;', // viewport center offset in image px
  'void main(){',
  '  float sc = uSC;',
  '  vec2 s = (gl_FragCoord.xy - uRes*0.5) / sc + uCenter;',
  '  float r = length(s);',
  '  vec3 dir;',
  '  if(r < 0.0001){',
  '    dir = vec3(0.0, 0.0, 1.0);',
  '  } else {',
  '    float theta = mix(atan(r / uFD), r / uFD, uK);',
  '    dir = vec3((s / r) * sin(theta), cos(theta));',
  '  }',
  '  vec3 ray = uR * dir;',
  '  if(ray.z <= 0.0){ gl_FragColor=vec4(0.06,0.06,0.06,1.); return; }',
  '  vec2 hit = (uFS/ray.z)*ray.xy;',
  '  vec2 uv  = hit/uImg + 0.5;',
  '  if(uv.x<0.||uv.x>1.||uv.y<0.||uv.y>1.){ gl_FragColor=vec4(0.06,0.06,0.06,1.); return; }',
  '  gl_FragColor = texture2D(uTex, uv);',
  '}'
].join('\n');

function mkShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS))
    throw new Error('Shader error: ' + gl.getShaderInfoLog(s));
  return s;
}

const prog = gl.createProgram();
gl.attachShader(prog, mkShader(gl.VERTEX_SHADER, VS));
gl.attachShader(prog, mkShader(gl.FRAGMENT_SHADER, FS));
gl.linkProgram(prog);
if (!gl.getProgramParameter(prog, gl.LINK_STATUS))
  throw new Error('Link error: ' + gl.getProgramInfoLog(prog));
gl.useProgram(prog);

gl.bindBuffer(gl.ARRAY_BUFFER, gl.createBuffer());
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
const aLoc = gl.getAttribLocation(prog, 'a');
gl.enableVertexAttribArray(aLoc);
gl.vertexAttribPointer(aLoc, 2, gl.FLOAT, false, 0, 0);

const U = {};
['uTex','uRes','uImg','uFS','uFD','uK','uR','uSC','uCenter'].forEach(n => { U[n] = gl.getUniformLocation(prog, n); });

const tex = gl.createTexture();
gl.bindTexture(gl.TEXTURE_2D, tex);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);

// ---- State ------------------------------------------------------------------
let loaded = false;
let imgW = 1, imgH = 1;
let fSrc = 1000, fDst = 1000;
let yaw = 0, pitch = 0, roll = 0;
let fisheyeK = 0;
let frameX = 0, frameY = 0, frameW = 0, frameH = 0;
let frameResizing = false, resizeHandle = '';
let frameMoving = false;
let resizeStartX = 0, resizeStartY = 0, resizeStartFX = 0, resizeStartFY = 0, resizeStartW = 0, resizeStartH = 0;

const ROT_SPD  = Math.PI / 3;  // 60 deg/s for keys
const ZOOM_SPD = Math.LN2;     // x2 or /2 per second
const MOBILE_QUERY = '(max-width: 768px)';
const TOUCH_PAN_SENS = 0.004;

function reset() { yaw = pitch = roll = 0; fDst = fSrc; }

function isMobileScreen() {
  return window.matchMedia(MOBILE_QUERY).matches;
}

function syncMobileUI() {
  document.body.classList.toggle('mobile', isMobileScreen());
}

syncMobileUI();
window.addEventListener('resize', syncMobileUI);
window.matchMedia(MOBILE_QUERY).addEventListener('change', syncMobileUI);

// R = Ry(yaw) * Rx(pitch) * Rz(roll), column-major flat for WebGL
function rotMat(y, p, r) {
  const cy=Math.cos(y), sy=Math.sin(y);
  const cp=Math.cos(p), sp=Math.sin(p);
  const cr=Math.cos(r), sr=Math.sin(r);
  return new Float32Array([
    cy*cr+sy*sp*sr,  cp*sr, -sy*cr+cy*sp*sr,   // col 0
   -cy*sr+sy*sp*cr,  cp*cr,  sy*sr+cy*sp*cr,   // col 1
    sy*cp,          -sp,     cy*cp              // col 2
  ]);
}

function draw() {
  if (!loaded) return;
  gl.uniform2f(U.uRes, cv.width, cv.height);
  gl.uniform2f(U.uImg, imgW, imgH);
  gl.uniform1f(U.uFS, fSrc);
  gl.uniform1f(U.uFD, fDst);
  gl.uniform1f(U.uK, fisheyeK);
  gl.uniformMatrix3fv(U.uR, false, rotMat(yaw, pitch, roll));
  gl.uniform1f(U.uSC, Math.min(cv.width / imgW, cv.height / imgH));
  gl.uniform2f(U.uCenter, 0, 0);
  gl.uniform1i(U.uTex, 0);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

function fmtDeg(v) { return (v * 180 / Math.PI).toFixed(1) + '°'; }

function updateHUD() {
  const f35eq = (fDst * 36 / Math.max(imgW, imgH)).toFixed(0);
  const projLabel = fisheyeK === 0 ? 'Perspective' : fisheyeK === 1 ? 'Equidistant' : 'Fisheye ' + Math.round(fisheyeK * 100) + '%';
  const minPx = Math.min(imgW, imgH);
  const expW = frameW <= frameH ? minPx : Math.round(minPx * frameW / frameH);
  const expH = frameW <= frameH ? Math.round(minPx * frameH / frameW) : minPx;
  document.getElementById('hud').innerHTML =
    'Yaw: ' + fmtDeg(yaw) + ' &nbsp; Pitch: ' + fmtDeg(pitch) + ' &nbsp; Roll: ' + fmtDeg(roll) + '<br>' +
    'Focal: ' + f35eq + 'mm equiv &nbsp;&#183;&nbsp; src: ' + Math.round(fSrc) + 'px' + '<br>' +
    'Projection: ' + projLabel + '<br>' +
    'Export: ' + expW + ' &#215; ' + expH + 'px';
}

// ---- Frame overlay ----------------------------------------------------------
const frameEl = document.getElementById('frame-box');

function positionFrame() {
  frameEl.style.width   = frameW + 'px';
  frameEl.style.height  = frameH + 'px';
  frameEl.style.left    = frameX + 'px';
  frameEl.style.top     = frameY + 'px';
  frameEl.style.display = 'block';
}

function getTargetRatio() {
  const sel = document.getElementById('frame-ratio').value;
  if (sel === 'original') return imgW / imgH;
  if (sel === 'freeform')  return 0;
  const parts = sel.split(':');
  return parts.length === 2 ? parseFloat(parts[0]) / parseFloat(parts[1]) : 0;
}

function applyRatioSnap() {
  if (!loaded) return;
  const sel = document.getElementById('frame-ratio').value;
  const ww = window.innerWidth, wh = window.innerHeight;
  if (sel === 'original') {
    const scale = Math.min(ww / imgW, wh / imgH);
    frameW = imgW * scale;
    frameH = imgH * scale;
  } else {
    const ratio = getTargetRatio();
    if (ratio <= 0) return; // freeform – keep current size
    const maxW = ww - 4, maxH = wh - 4;
    if (frameW / frameH > ratio) {
      frameH = frameW / ratio;
      if (frameH > maxH) { frameH = maxH; frameW = frameH * ratio; }
    } else {
      frameW = frameH * ratio;
      if (frameW > maxW) { frameW = maxW; frameH = frameW / ratio; }
    }
  }
  // re-center after snap
  frameX = (ww - frameW) / 2;
  frameY = (wh - frameH) / 2;
}

function applyFrameResize(dx, dy) {
  const ratio = getTargetRatio();
  const h = resizeHandle;
  const MIN = 20;

  // Which edges are moving?
  const mR = h === 'e'  || h === 'se' || h === 'ne';
  const mL = h === 'w'  || h === 'sw' || h === 'nw';
  const mB = h === 's'  || h === 'se' || h === 'sw';
  const mT = h === 'n'  || h === 'ne' || h === 'nw';

  // Raw new size from dragging only this handle
  let newW = Math.max(MIN, resizeStartW + (mR ? dx : mL ? -dx : 0));
  let newH = Math.max(MIN, resizeStartH + (mB ? dy : mT ? -dy : 0));

  // Apply ratio constraint
  if (ratio > 0) {
    const isCorner = (mR || mL) && (mT || mB);
    if (!isCorner && (mR || mL)) {
      // horizontal-only edge: width drives, height follows, center vertically
      newH = newW / ratio;
    } else if (!isCorner && (mT || mB)) {
      // vertical-only edge: height drives, width follows, center horizontally
      newW = newH * ratio;
    } else {
      // corner: dominant axis wins
      if (Math.abs(dx) >= Math.abs(dy)) newH = newW / ratio;
      else                               newW = newH * ratio;
      newW = Math.max(MIN, newW);
      newH = Math.max(MIN, newH);
    }
  }

  // Fixed-edge anchors (the edges that don't move)
  const fixedRight  = resizeStartFX + resizeStartW;
  const fixedBottom = resizeStartFY + resizeStartH;

  // Compute new top-left
  let newX = mL ? fixedRight - newW : resizeStartFX;
  let newY = mT ? fixedBottom - newH : resizeStartFY;

  // For single-axis edge+ratio drags, center on the perpendicular axis
  if (ratio > 0 && !((mR || mL) && (mT || mB))) {
    if (mR || mL) newY = resizeStartFY + (resizeStartH - newH) / 2;
    if (mT || mB) newX = resizeStartFX + (resizeStartW - newW) / 2;
  }

  frameX = newX;
  frameY = newY;
  frameW = newW;
  frameH = newH;
  clampFrame();
  positionFrame();
  updateHUD();
}

function clampFrame() {
  const ww = window.innerWidth, wh = window.innerHeight;
  const PAD = 7; // handle half-size
  frameX = Math.max(PAD, Math.min(ww - frameW - PAD, frameX));
  frameY = Math.max(PAD, Math.min(wh - frameH - PAD, frameY));
}

function updateFrame() {
  if (!loaded) return;
  const ww = window.innerWidth, wh = window.innerHeight;
  if (frameW === 0) {
    const scale = Math.min(ww / imgW, wh / imgH);
    frameW = imgW * scale;
    frameH = imgH * scale;
    frameX = (ww - frameW) / 2;
    frameY = (wh - frameH) / 2;
  } else {
    // On window resize: clamp so frame stays visible
    const s = Math.min((ww - 4) / frameW, (wh - 4) / frameH);
    if (s < 1) {
      frameW *= s; frameH *= s;
      frameX = (ww - frameW) / 2;
      frameY = (wh - frameH) / 2;
    }
  }
  positionFrame();
}

// ---- Keyboard ---------------------------------------------------------------
const held = new Set();

document.addEventListener('keydown', e => {
  held.add(e.key);
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','-','=','[',']'].includes(e.key))
    e.preventDefault();
  if (e.key === 'r' || e.key === 'R') { reset(); draw(); updateHUD(); }
});
document.addEventListener('keyup', e => held.delete(e.key));

// ---- Mouse drag -------------------------------------------------------------
let dragging = false, dragX = 0, dragY = 0;
const MOUSE_SENS = 0.004; // radians per CSS pixel

cv.addEventListener('mousedown', e => {
  if (!loaded) return;
  dragging = true; dragX = e.clientX; dragY = e.clientY;
  cv.classList.add('dragging');
});
document.addEventListener('mousemove', e => {
  if (frameMoving) {
    frameX = resizeStartFX + (e.clientX - resizeStartX);
    frameY = resizeStartFY + (e.clientY - resizeStartY);
    clampFrame();
    positionFrame();
    updateHUD();
    return;
  }
  if (frameResizing) {
    applyFrameResize(e.clientX - resizeStartX, e.clientY - resizeStartY);
    return;
  }
  if (!dragging) return;
  const dx = e.clientX - dragX;
  const dy = e.clientY - dragY;
  dragX = e.clientX; dragY = e.clientY;
  yaw   -= dx * MOUSE_SENS;
  pitch -= dy * MOUSE_SENS;
  draw(); updateHUD();
});
document.addEventListener('mouseup', () => {
  dragging = false;
  frameResizing = false;
  frameMoving = false;
  cv.classList.remove('dragging');
  document.body.style.cursor = '';
});

// ---- Touch gestures --------------------------------------------------------
let touchMode = null;
let touchX = 0, touchY = 0;
let touchDistance = 0, touchAngle = 0;

function getTouchDistance(a, b) {
  return Math.hypot(b.clientX - a.clientX, b.clientY - a.clientY);
}

function getTouchAngle(a, b) {
  return Math.atan2(b.clientY - a.clientY, b.clientX - a.clientX);
}

cv.addEventListener('touchstart', e => {
  if (!loaded) return;

  if (e.touches.length === 1) {
    const touch = e.touches[0];
    touchMode = 'pan';
    touchX = touch.clientX;
    touchY = touch.clientY;
    return;
  }

  if (e.touches.length >= 2) {
    touchMode = 'gesture';
    touchDistance = getTouchDistance(e.touches[0], e.touches[1]);
    touchAngle = getTouchAngle(e.touches[0], e.touches[1]);
  }
}, { passive: true });

cv.addEventListener('touchmove', e => {
  if (!loaded) return;

  if (touchMode === 'pan' && e.touches.length === 1) {
    e.preventDefault();
    const touch = e.touches[0];
    const dx = touch.clientX - touchX;
    const dy = touch.clientY - touchY;
    touchX = touch.clientX;
    touchY = touch.clientY;
    yaw -= dx * TOUCH_PAN_SENS;
    pitch -= dy * TOUCH_PAN_SENS;
    draw(); updateHUD();
    return;
  }

  if (e.touches.length >= 2) {
    e.preventDefault();
    const nextDistance = getTouchDistance(e.touches[0], e.touches[1]);
    const nextAngle = getTouchAngle(e.touches[0], e.touches[1]);

    if (touchDistance > 0 && nextDistance > 0) {
      fDst *= nextDistance / touchDistance;
    }
    roll += nextAngle - touchAngle;
    touchMode = 'gesture';
    touchDistance = nextDistance;
    touchAngle = nextAngle;
    draw(); updateHUD();
  }
}, { passive: false });

cv.addEventListener('touchend', e => {
  if (e.touches.length >= 2) {
    touchMode = 'gesture';
    touchDistance = getTouchDistance(e.touches[0], e.touches[1]);
    touchAngle = getTouchAngle(e.touches[0], e.touches[1]);
    return;
  }

  if (e.touches.length === 1) {
    const touch = e.touches[0];
    touchMode = 'pan';
    touchX = touch.clientX;
    touchY = touch.clientY;
    return;
  }

  touchMode = null;
}, { passive: true });

// ---- Scroll wheel -----------------------------------------------------------
cv.addEventListener('wheel', e => {
  if (!loaded) return;
  e.preventDefault();
  const ROLL_SENS = 0.003;  // radians per scroll pixel
  const ZOOM_SENS = 0.001;
  if (e.altKey) {
    // Alt/Option+scroll = fisheye blend
    const FISHEYE_SENS = 0.002;
    fisheyeK = Math.max(0, Math.min(1, fisheyeK + e.deltaY * FISHEYE_SENS));
    document.getElementById('fisheye-k').value = fisheyeK;
  } else if (e.shiftKey || Math.abs(e.deltaX) > Math.abs(e.deltaY)) {
    // Shift+scroll or horizontal scroll = roll
    const delta = e.shiftKey ? e.deltaY : e.deltaX;
    roll += delta * ROLL_SENS;
  } else {
    // Vertical scroll = zoom
    fDst *= Math.exp(-e.deltaY * ZOOM_SENS);
  }
  draw(); updateHUD();
}, { passive: false });

// ---- Animation loop ---------------------------------------------------------
let prevT = 0;
(function loop(t) {
  requestAnimationFrame(loop);
  if (!loaded) { prevT = t; return; }

  const dt = Math.min((t - prevT) / 1000, 0.1);
  prevT = t;

  let moved = false;

  if (held.has('ArrowLeft'))  { yaw   -= ROT_SPD * dt; moved = true; }
  if (held.has('ArrowRight')) { yaw   += ROT_SPD * dt; moved = true; }
  if (held.has('ArrowUp'))    { pitch -= ROT_SPD * dt; moved = true; }
  if (held.has('ArrowDown'))  { pitch += ROT_SPD * dt; moved = true; }
  if (held.has('['))          { roll  -= ROT_SPD * dt; moved = true; }
  if (held.has(']'))          { roll  += ROT_SPD * dt; moved = true; }
  if (held.has('-'))          { fDst *= Math.exp(-ZOOM_SPD * dt); moved = true; }
  if (held.has('='))          { fDst *= Math.exp( ZOOM_SPD * dt); moved = true; }

  if (moved) { draw(); updateHUD(); }
})();

// ---- Export -----------------------------------------------------------------
function exportFrame() {
  if (!loaded) return;
  const ww = window.innerWidth, wh = window.innerHeight;

  // Scale: CSS px per image px on screen
  const imgScale = Math.min(ww / imgW, wh / imgH);

  // Frame size in image-coordinate space
  const fw_img = frameW / imgScale;
  const fh_img = frameH / imgScale;

  // Export pixel dimensions: short edge = min(imgW, imgH)
  const minPx = Math.min(imgW, imgH);
  const exportW = frameW <= frameH ? minPx : Math.round(minPx * frameW / frameH);
  const exportH = frameW <= frameH ? Math.round(minPx * frameH / frameW) : minPx;

  // Export scale: export pixels per image pixel
  const sc_export = exportW / fw_img;

  // Frame center offset from screen centre in CSS px (Y flipped for WebGL)
  const cx_img = (frameX + frameW / 2 - ww / 2) / imgScale;
  const cy_img = (wh / 2 - frameY - frameH / 2) / imgScale;

  // Render the exact frame viewport at export resolution
  const oldW = cv.width, oldH = cv.height;
  cv.width = exportW; cv.height = exportH;
  gl.viewport(0, 0, exportW, exportH);
  gl.uniform2f(U.uRes, exportW, exportH);
  gl.uniform2f(U.uImg, imgW, imgH);
  gl.uniform1f(U.uFS, fSrc);
  gl.uniform1f(U.uFD, fDst);
  gl.uniform1f(U.uK, fisheyeK);
  gl.uniformMatrix3fv(U.uR, false, rotMat(yaw, pitch, roll));
  gl.uniform1f(U.uSC, sc_export);
  gl.uniform2f(U.uCenter, cx_img, cy_img);
  gl.uniform1i(U.uTex, 0);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

  const dataURL = cv.toDataURL('image/png');

  // Restore display canvas
  cv.width = oldW; cv.height = oldH;
  gl.viewport(0, 0, oldW, oldH);
  draw();

  const a = document.createElement('a');
  a.href = dataURL;
  a.download = 'reprojected.png';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

// ---- Image loading ----------------------------------------------------------
async function loadFile(file) {
  if (!file || !file.type.startsWith('image/')) return;

  let f35 = 50;
  try {
    if (typeof exifr !== 'undefined') {
      const exif = await exifr.parse(file);
      if (exif) {
        const equiv = exif.FocalLengthIn35mmFilm
                   || exif.FocalLengthIn35mmFormat
                   || exif.FocalLength35efl;
        if (equiv) {
          f35 = equiv;
        } else if (exif.FocalLength) {
          f35 = exif.FocalLength * 1.5; // assume APS-C 1.5x crop
        }
      }
    }
  } catch (_) {}

  const url = URL.createObjectURL(file);
  const img = new Image();

  img.onload = () => {
    imgW = img.naturalWidth;
    imgH = img.naturalHeight;
    // 35mm full-frame long side = 36mm
    fSrc = f35 * Math.max(imgW, imgH) / 36;
    fDst = fSrc;
    yaw = pitch = roll = 0;

    gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, true);
    gl.bindTexture(gl.TEXTURE_2D, tex);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, img);
    URL.revokeObjectURL(url);

    loaded = true;
    document.getElementById('drop-zone').classList.add('hidden');
    ['hud','ctrl','help'].forEach(id =>
      document.getElementById(id).classList.remove('hidden'));
    document.getElementById('f35').value = Math.round(f35);
    draw();
    updateHUD();
    updateFrame();
  };
  img.onerror = () => URL.revokeObjectURL(url);
  img.src = url;
}

// ---- Drag & drop / file open ------------------------------------------------
const dz = document.getElementById('drop-zone');
dz.addEventListener('click', () => document.getElementById('file-in').click());
dz.addEventListener('dragover',  e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('drag-over');
  loadFile(e.dataTransfer.files[0]);
});
document.getElementById('file-in').addEventListener('change', e => {
  loadFile(e.target.files[0]); e.target.value = '';
});

// ---- Controls ---------------------------------------------------------------
document.getElementById('open-btn').addEventListener('click', () =>
  document.getElementById('file-in').click());
document.getElementById('reset-btn').addEventListener('click', () =>
  { reset(); draw(); updateHUD(); });
document.getElementById('export-btn').addEventListener('click', exportFrame);
document.getElementById('apply-btn').addEventListener('click', () => {
  const f = parseFloat(document.getElementById('f35').value);
  if (!f || f <= 0) return;
  const ratio = fDst / fSrc;
  fSrc = f * Math.max(imgW, imgH) / 36;
  fDst = fSrc * ratio;
  draw(); updateHUD();
});
document.getElementById('fisheye-k').addEventListener('input', e => {
  fisheyeK = parseFloat(e.target.value);
  draw(); updateHUD();
});
document.getElementById('frame-ratio').addEventListener('change', () => {
  applyRatioSnap();
  positionFrame();
  updateHUD();
});

// ---- Frame resize handles ---------------------------------------------------
document.querySelectorAll('.frame-handle').forEach(handle => {
  handle.addEventListener('mousedown', e => {
    if (!loaded) return;
    e.stopPropagation();
    e.preventDefault();
    resizeStartX  = e.clientX;
    resizeStartY  = e.clientY;
    resizeStartFX = frameX;
    resizeStartFY = frameY;
    resizeStartW  = frameW;
    resizeStartH  = frameH;
    if (handle.dataset.dir === 'nw') {
      frameMoving = true;
      document.body.style.cursor = 'move';
    } else {
      frameResizing = true;
      resizeHandle  = handle.dataset.dir;
      document.body.style.cursor = window.getComputedStyle(handle).cursor;
    }
  });
  handle.addEventListener('touchstart', e => {
    if (!loaded) return;
    e.stopPropagation();
    touchMode = null; // cancel any canvas gesture in progress
    const t = e.touches[0];
    resizeStartX  = t.clientX;
    resizeStartY  = t.clientY;
    resizeStartFX = frameX;
    resizeStartFY = frameY;
    resizeStartW  = frameW;
    resizeStartH  = frameH;
    if (handle.dataset.dir === 'nw') {
      frameMoving = true;
    } else {
      frameResizing = true;
      resizeHandle  = handle.dataset.dir;
    }
  }, { passive: true });
});

document.addEventListener('touchmove', e => {
  if (!frameMoving && !frameResizing) return;
  e.preventDefault();
  const t = e.touches[0];
  if (frameMoving) {
    frameX = resizeStartFX + (t.clientX - resizeStartX);
    frameY = resizeStartFY + (t.clientY - resizeStartY);
    clampFrame();
    positionFrame();
    updateHUD();
  } else {
    applyFrameResize(t.clientX - resizeStartX, t.clientY - resizeStartY);
  }
}, { passive: false });

document.addEventListener('touchend', () => { frameResizing = false; frameMoving = false; });
</script>
